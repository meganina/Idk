<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>High-Security Arsenal</title>
    <style>
        :root { --accent: #ff4444; }
        body { margin: 0; background: #0a0a0a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; overflow: hidden; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 90%; margin-bottom: 20px; }
        
        /* Weapon Buttons */
        .weapon-btn { padding: 15px; border-radius: 8px; border: 2px solid var(--accent); background: rgba(255,255,255,0.05); color: white; font-weight: bold; position: relative; cursor: pointer; }
        .weapon-btn.active { background: var(--accent); color: black; box-shadow: 0 0 15px var(--accent); }
        
        /* Detonator Security Glass */
        #glass-cover {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(2px);
            border-radius: 6px; border: 1px solid rgba(255, 255, 255, 0.4);
            display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #fff;
            transition: 0.2s; z-index: 5;
        }
        .glass-broken { opacity: 0; pointer-events: none; transform: scale(1.2); }

        #powerBtn { width: 140px; height: 140px; border-radius: 50%; border: 6px solid var(--accent); background: #1a1a1a; font-size: 1.1rem; color: white; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="grid">
        <button id="akMode" class="weapon-btn active" onclick="setMode('ak')">AK-47</button>
        <button id="saberMode" class="weapon-btn" onclick="setMode('saber')">SABER</button>
        <button id="gunMode" class="weapon-btn" onclick="setMode('gun')">GUN</button>
        <button id="taserMode" class="weapon-btn" onclick="setMode('taser')">TASER</button>
        <button id="whipMode" class="weapon-btn" onclick="setMode('whip')">WHIP</button>
        
        <div style="position: relative;">
            <button id="bombMode" class="weapon-btn" style="width: 100%;" onclick="tryArmDetonator()">DETONATOR</button>
            <div id="glass-cover" onclick="breakGlass(event)">LOCKED</div>
        </div>
    </div>

    <div id="status">SYSTEM OFFLINE</div>
    <button id="powerBtn">START</button>

    <script>
        let audioCtx, sounds = {}, videoTrack;
        let currentMode = 'ak';
        let isArmed = false, isLocked = false, lastSwingTime = 0;
        let detonatorArmed = false;

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                videoTrack = stream.getVideoTracks()[0];
            } catch (e) { console.error("Camera access failed."); }
        }

        async function toggleFlash(state) {
            if (videoTrack && videoTrack.getCapabilities().torch) {
                try { await videoTrack.applyConstraints({ advanced: [{ torch: state }] }); } catch (e) {}
            }
        }

        function breakGlass(e) {
            e.stopPropagation(); // Stop from clicking the button underneath
            document.getElementById('glass-cover').classList.add('glass-broken');
        }

        function tryArmDetonator() {
            setMode('bomb');
            detonatorArmed = true;
            document.getElementById('bombMode').innerText = "DETONATOR (ARMED)";
        }

        async function loadSounds() {
            const files = {
                ak: 'audiomass-output2.mp3',
                gun: 'audiomass-output2.mp3', 
                whip: 'universfield-whip-02-242215.mp3',
                saberNormal: 'freesound_community-swing3-94210.mp3',
                saberCombo: 'audiomass-output.mp3',
                bomb: 'audiomass-output3.mp3',
                taser: 'freesound_community-taser-38490.mp3'
            };
            for (const [key, url] of Object.entries(files)) {
                try {
                    const res = await fetch(url);
                    sounds[key] = await audioCtx.decodeAudioData(await res.arrayBuffer());
                } catch (e) { console.error("Load failed:", url); }
            }
            document.getElementById('status').innerText = "SYSTEMS LIVE";
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.weapon-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(mode + 'Mode')?.classList.add('active');
            
            const colors = { ak: '#ff4444', saber: '#00e5ff', gun: '#ff8800', whip: '#ffca28', bomb: '#4caf50', taser: '#a200ff' };
            document.documentElement.style.setProperty('--accent', colors[mode]);
        }

        async function play(buffer, vib, lockTime) {
            if (!buffer) return;
            isLocked = true;
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.connect(audioCtx.destination);
            source.start(0);
            
            toggleFlash(true);
            if (navigator.vibrate) navigator.vibrate(vib);
            document.body.style.backgroundColor = getComputedStyle(document.documentElement).getPropertyValue('--accent');

            setTimeout(async () => {
                document.body.style.backgroundColor = "#0a0a0a";
                await toggleFlash(false);
                isLocked = false; 
            }, lockTime); 
        }

        window.addEventListener('devicemotion', (e) => {
            if (!isArmed || isLocked || !sounds.ak) return;
            const force = Math.sqrt(e.acceleration.x**2 + e.acceleration.y**2 + e.acceleration.z**2);
            
            if (force > 26) {
                const now = Date.now();
                const diff = (now - lastSwingTime) / 1000;
                
                if (currentMode === 'ak') {
                    play(sounds.ak, 40, 70); 
                } else if (currentMode === 'taser') {
                    play(sounds.taser, 200, 300); // Sharp vibration for taser
                } else if (currentMode === 'bomb') {
                    play(sounds.bomb, 100, 1000); // Slow reset for explosion
                } else if (currentMode === 'gun') {
                    play(sounds.gun, 100, 500); 
                } else if (currentMode === 'saber') {
                    diff < 0.6 ? play(sounds.saberCombo, 60, 100) : play(sounds.saberNormal, 40, 100);
                } else {
                    play(sounds[currentMode], 100, 800);
                }
                lastSwingTime = now;
            }
        });

        document.getElementById('powerBtn').addEventListener('click', async function() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                await initCamera();
                await loadSounds();
                isArmed = true;
                this.innerText = "ARMED";
            }
        });
    </script>
</body>
</html>
